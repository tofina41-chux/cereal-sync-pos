<script>
    async function sendStkPush(event) { 
        const phoneInput = document.getElementById('customerPhone');
        const phone = phoneInput ? phoneInput.value.trim() : "";
        
        // Ensure amount is an integer
        const amount = Math.round(parseFloat("{{ total_cart_value|default:'0' }}"));
        const btn = event.target;
        
        // 1. Validation
        if (!phone.startsWith('254') || phone.length !== 12) {
            alert("Please use format 2547XXXXXXXX");
            return;
        }

        if (amount <= 0) {
            alert("Your cart is empty! Add some cereal first.");
            return;
        }

        // 2. UI Feedback
        const originalText = btn.innerText;
        btn.innerText = "SENDING PUSH...";
        btn.disabled = true;

        try {
            const response = await fetch("{% url 'initiate_stk_push' %}", {
                method: "POST",
                headers: {
                    "Content-Type": "application/x-www-form-urlencoded",
                    "X-CSRFToken": "{{ csrf_token }}"
                },
                body: `phone=${phone}&amount=${amount}`
            });

            const data = await response.json();
            console.log("Safaricom Response:", data);

            // 3. Handle Response
            if (data.ResponseCode === "0") {
                alert("PIN Prompt Sent! Enter your PIN on your phone to complete payment.");
                
                setTimeout(() => {
                    window.location.href = "{% url 'checkout' %}";
                }, 3000); 
                
            } else {
                const errorMsg = data.errorMessage || data.CustomerMessage || "Check your Daraja credentials.";
                alert("M-Pesa Error: " + errorMsg);
            }
        } catch (error) {
            console.error("Fetch Error:", error);
            alert("Connection failed. Check if Django and ngrok are running.");
        } finally {
            btn.innerText = originalText;
            btn.disabled = false;
        }
    }
</script>
