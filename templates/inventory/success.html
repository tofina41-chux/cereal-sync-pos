{% extends 'base.html' %}

{% block content %}
<div class="max-w-md mx-auto mt-20 text-center bg-white p-10 rounded-3xl shadow-xl">
    <div class="w-20 h-20 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-6">
        <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
    </div>
    <h2 class="text-3xl font-black mb-2">Sale Complete!</h2>
    <p class="text-gray-500 mb-8">The inventory has been updated and the transaction is logged.</p>
    
    <a href="{% url 'dashboard' %}" class="block w-full bg-gray-900 text-white py-4 rounded-2xl font-bold hover:bg-green-600 transition-colors">
        Back to Dashboard
    </a>
</div>
{% endblock %}
